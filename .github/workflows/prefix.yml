name: prefix

on:
  push:
    paths:
      - .github/workflows/prefix.yml

jobs:
  prefix-symbols:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - stable
          - armv7-linux-androideabi
          - aarch64-linux-android
          - i686-linux-android
          - x86_64-linux-android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Create test project
        run: |
          cargo init brssl2-prefix
          cd brssl2-prefix
          cargo add boring-sys2 --path ../boring-sys/
          cargo add openssl-sys -F vendored
          echo "fn main() {boring_sys2::init(); openssl_sys::init();}" > src/main.rs
      - name: Prepare Android toolchain
        if: contains(matrix.target, 'android')
        run: |
          rustup target add ${{ matrix.target }}
          cargo install cargo-ndk
      - name: Build without prefixing
        if: matrix.target == 'stable'
        run: |
          if ! cargo build 2>&1 | grep "lld: error: duplicate symbol"; then
            echo "Build without prefixing succeeded, should fail.";
            exit 1;
          fi
      - name: Android build without prefixing
        if: contains(matrix.target, 'android')
        run: |
          if ! cargo ndk -t ${{ matrix.target }} build 2>&1 | grep "lld: error: duplicate symbol"; then
            echo "Build without prefixing succeeded, should fail.";
            exit 1;
          fi
      - name: Add prefix-symbols feature
        run: |
          cd brssl2-prefix
          cargo add boring-sys2 --path ../boring-sys/ -F prefix-symbols
      - name: Build with prefixing
        if: matrix.target == 'stable'
        run: |
          pwd
          cargo build
      - name: Android build with prefixing
        if: contains(matrix.target, 'android')
        run: |
          pwd
          cargo ndk -t ${{ matrix.target }} build
