name: prefix

on:
  push:
    paths:
      - .github/workflows/prefix.yml

jobs:
  prefix-symbols:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # - target: x86_64-unknown-linux-gnu
          #   os: ubuntu-latest
          #   build: cargo build --target
          # - target: aarch64-unknown-linux-gnu
          #   os: ubuntu-latest
          #   build: cargo build --target
          #   apt_packages: crossbuild-essential-arm64
          #   custom_env:
          #     CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          #     CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          #     CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-g++
          # - target: armv7-linux-androideabi
          #   os: ubuntu-latest
          #   build: cargo ndk build --target
          # - target: aarch64-linux-android
          #   os: ubuntu-latest
          #   build: cargo ndk build --target
          # - target: x86_64-linux-android
          #   os: ubuntu-latest
          #   build: cargo ndk build --target
          # Openssl issue on i686: https://github.com/rust-openssl/rust-openssl/issues/2163#issuecomment-2692363343
          # - target: i686-linux-android
          #   os: ubuntu-latest
          #   build: cargo ndk build --target
          # - target: aarch64-apple-darwin
          #   os: macos-latest
          #   build: cargo build --target
          # - target: x86_64-apple-darwin
          #   os: macos-latest
          #   build: cargo build --target
          - target: x86_64-apple-ios
            os: macos-latest
            build: cargo build --target
            custom_env:
              IPHONEOS_DEPLOYMENT_TARGET: 26.1
          - target: aarch64-apple-ios
            os: macos-latest
            build: cargo build --target
            custom_env:
              IPHONEOS_DEPLOYMENT_TARGET: 26.1
    defaults:
      run:
        working-directory: brssl2-prefix
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Initialize
        working-directory: .
        run: |
          rustup target add ${{ matrix.target }}
          cargo init brssl2-prefix
          cd brssl2-prefix
          cargo add boring-sys2 --path ../boring-sys/
          cargo add openssl-sys -F vendored
          echo "fn main() {boring_sys2::init(); openssl_sys::init();}" > src/main.rs
      - name: Install target-specific APT dependencies
        if: "matrix.apt_packages != ''"
        run: sudo apt update && sudo apt install -y ${{ matrix.apt_packages }}
      - name: Install cargo-ndk
        if: contains(matrix.target, 'android')
        run: cargo install cargo-ndk
      - name: Build without prefixing
        if: ${{ !contains(matrix.target, 'apple') }}
        env: ${{ matrix.custom_env }}
        run: |
          RC=0
          ${{ matrix.build }} ${{ matrix.target }} >logs 2>&1 || RC=$?
          if [[ $RC == 0 || (! $(cat logs | grep "lld: error: duplicate symbol") && ! $(cat logs | grep "multiple definition of")) ]]; then
            cat logs
            echo "Build finished without duplicate symbols: $RC"
            exit 1
          fi
          cat logs
          echo "Failed as expected: $RC"
      - name: Apple works without prefixing
        if: contains(matrix.target, 'apple')
        env: ${{ matrix.custom_env }}
        run: ${{ matrix.build }} ${{ matrix.target }}
      - name: Add prefix-symbols feature
        run: cargo add boring-sys2 --path ../boring-sys/ -F prefix-symbols
      - name: Build with prefixing
        env: ${{ matrix.custom_env }}
        run: ${{ matrix.build }} ${{ matrix.target }}
