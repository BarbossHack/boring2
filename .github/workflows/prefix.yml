name: prefix

on:
  push:
    paths:
      - .github/workflows/prefix.yml

jobs:
  prefix-symbols:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          # - armv7-linux-androideabi
          # - aarch64-linux-android
          # Openssl issue on i686: https://github.com/rust-openssl/rust-openssl/issues/2163#issuecomment-2692363343
          # - i686-linux-android
          - x86_64-linux-android
          # - aarch64-apple-darwin
          - x86_64-apple-darwin
        include:
          - os: ubuntu-latest
            build: cargo build --target
          - target: x86_64-linux-android
            os: ubuntu-latest
            build: cargo ndk build --target
          - target: aarch64-apple-darwin
            os: macos-latest
            build: cargo build --target
          - target: x86_64-apple-darwin
            os: macos-latest
            build: cargo build --target
    defaults:
      run:
        working-directory: brssl2-prefix
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Initialize
        working-directory: .
        run: |
          rustup target add ${{ matrix.target }}
          cargo init brssl2-prefix
          cd brssl2-prefix
          cargo add boring-sys2 --path ../boring-sys/
          cargo add openssl-sys -F vendored
          echo "fn main() {boring_sys2::init(); openssl_sys::init();}" > src/main.rs
      - name: Install cargo-ndk
        if: contains(matrix.target, 'android')
        run: cargo install cargo-ndk
      - name: Build without prefixing
        if: ${{ !contains(matrix.target, 'android') }}
        run: |
          exit 0
          if ! ${{ matrix.build }} ${{ matrix.target }} 2>&1 | grep "lld: error: duplicate symbol"; then
            echo "Build without prefixing succeeded, should fail.";
            exit 1;
          fi
      - name: Android build without prefixing
        if: contains(matrix.target, 'android')
        run: |
          if ! ${{ matrix.build }} ${{ matrix.target }} 2>&1 | grep "lld: error: duplicate symbol"; then
            echo "Build without prefixing succeeded, should fail.";
            exit 1;
          fi
      - name: Add prefix-symbols feature
        run: cargo add boring-sys2 --path ../boring-sys/ -F prefix-symbols
      - name: Build with prefixing
        if: ${{ !contains(matrix.target, 'android') }}
        run: ${{ matrix.build }} ${{ matrix.target }}
      - name: Android build with prefixing
        if: contains(matrix.target, 'android')
        run: ${{ matrix.build }} ${{ matrix.target }}
